<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Client — Privacy-First API Client</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="url(#logoGrad)"/>
            <path d="M8 14h12M14 8v12" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Ghost Client</span>
        </div>
        <span class="badge">100% Offline</span>
        <span id="onlineIndicator" class="online-indicator online" title="Online"></span>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="themeToggle" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="btn-icon" id="settingsBtn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button class="btn-icon" id="importBtn" title="Import collection">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        </button>
        <button class="btn-icon" id="exportBtn" title="Export collection">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="app-body">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="collections">Collections</button>
          <button class="sidebar-tab" data-tab="history">History</button>
          <button class="sidebar-tab" data-tab="env">Environments</button>
          <button class="sidebar-tab" data-tab="tools">Tools</button>
        </div>

        <div class="sidebar-panel active" id="panel-collections">
          <div class="panel-header">
            <button class="btn-small" id="newCollectionBtn">+ Collection</button>
            <button class="btn-small" id="runCollectionBtn" title="Run all requests">▶ Run</button>
            <input type="text" id="collectionSearch" class="filter-input" placeholder="Search collections..." style="margin-left:auto;padding:4px 8px;font-size:11px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-elevated);color:var(--text-primary);outline:none;width:140px;">
          </div>
          <div class="panel-body" id="collectionsList"></div>
        </div>

        <div class="sidebar-panel" id="panel-history">
          <div class="panel-header">
            <button class="btn-small btn-danger" id="clearHistoryBtn">Clear</button>
          <input type="text" id="historyFilter" class="filter-input" placeholder="Filter history..." style="margin-left:auto;padding:4px 8px;font-size:11px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-elevated);color:var(--text-primary);outline:none;width:140px;">
          </div>
          <div class="panel-body" id="historyList"></div>
        </div>

        <div class="sidebar-panel" id="panel-env">
          <div class="panel-header">
            <button class="btn-small" id="newEnvBtn">+ Environment</button>
          </div>
          <div class="panel-body" id="envList"></div>
        </div>

        <div class="sidebar-panel" id="panel-tools">
          <div class="panel-header">
            <span style="font-size:11px;font-weight:600;color:var(--text-tertiary)">Developer Utilities</span>
          </div>
          <div class="panel-body tool-panel">
            <div class="tool-group">
              <label class="tool-label">cURL Import</label>
              <textarea id="curlImportInput" class="tool-textarea" placeholder="Paste curl command here..."></textarea>
              <button class="btn-small" id="importCurlBtn" style="width:100%;margin-top:4px">Import cURL</button>
            </div>
            <div class="tool-group">
              <label class="tool-label">JWT Decoder</label>
              <textarea id="jwtInput" class="tool-textarea" placeholder="Paste JWT token here..."></textarea>
              <div id="jwtOutput" class="tool-output"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">Base64</label>
              <div class="tool-row">
                <textarea id="b64Input" class="tool-textarea" placeholder="Text to encode/decode..."></textarea>
                <div class="tool-actions">
                  <button class="btn-small" id="b64EncBtn">Encode</button>
                  <button class="btn-small" id="b64DecBtn">Decode</button>
                </div>
              </div>
              <div id="b64Output" class="tool-output"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">URL Encode/Decode</label>
              <div class="tool-row">
                <textarea id="urlInput" class="tool-textarea" placeholder="Text to encode/decode..."></textarea>
                <div class="tool-actions">
                  <button class="btn-small" id="urlEncBtn">Encode</button>
                  <button class="btn-small" id="urlDecBtn">Decode</button>
                </div>
              </div>
              <div id="urlOutput" class="tool-output"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">HAR Import</label>
              <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px;">Import HTTP Archive from browser DevTools</div>
              <button class="btn-small" id="importHarBtn" style="width:100%">Import HAR File</button>
            </div>
            <div class="tool-group">
              <label class="tool-label">JSON Diff</label>
              <textarea id="jsonDiffA" class="tool-textarea" placeholder="Original JSON..."></textarea>
              <textarea id="jsonDiffB" class="tool-textarea" placeholder="Modified JSON..."></textarea>
              <button class="btn-small" id="jsonDiffBtn" style="width:100%;margin-top:4px">Compare</button>
              <div id="jsonDiffOutput" class="tool-output"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">Timestamp Converter</label>
              <input type="text" id="tsInput" class="tool-input" placeholder="Unix timestamp or ISO date...">
              <div id="tsOutput" class="tool-output" style="display:none"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">Hash Generator</label>
              <textarea id="hashInput" class="tool-textarea" placeholder="Text to hash..."></textarea>
              <select id="hashAlgo" class="tool-select">
                <option value="SHA-256" selected>SHA-256</option>
                <option value="SHA-1">SHA-1</option>
                <option value="SHA-512">SHA-512</option>
                <option value="MD5">MD5</option>
              </select>
              <div class="tool-row">
                <button class="btn-small" id="hashBtn" style="flex:1">Generate</button>
                <button class="btn-small" id="hashCopyBtn" style="flex:1">Copy</button>
              </div>
              <div id="hashOutput" class="tool-output"></div>
            </div>
            <div class="tool-group">
              <label class="tool-label">Cookie Jar</label>
              <div id="cookieJarList" class="tool-output" style="max-height:160px;margin-bottom:6px;"></div>
              <div class="tool-row" style="gap:4px;margin-bottom:4px;">
                <input type="text" id="cookieDomain" class="tool-input" placeholder="Domain (e.g., api.example.com)" style="flex:1;margin-bottom:0;">
              </div>
              <div class="tool-row" style="gap:4px;margin-bottom:4px;">
                <input type="text" id="cookieName" class="tool-input" placeholder="Name" style="flex:1;margin-bottom:0;">
                <input type="text" id="cookieValue" class="tool-input" placeholder="Value" style="flex:1;margin-bottom:0;">
              </div>
              <div class="tool-row" style="gap:4px;margin-bottom:4px;">
                <input type="text" id="cookiePath" class="tool-input" placeholder="Path (default /)" style="flex:1;margin-bottom:0;">
                <button class="btn-small" id="addCookieBtn" style="flex:1">Add Cookie</button>
              </div>
              <button class="btn-small btn-danger" id="clearCookiesBtn" style="width:100%">Clear All Cookies</button>
            </div>
            <div class="tool-group">
              <label class="tool-label">WebSocket Client</label>
              <div class="tool-row" style="gap:4px;margin-bottom:4px;">
                <input type="text" id="wsUrl" class="tool-input" placeholder="wss://echo.websocket.org/" value="wss://echo.websocket.org/" style="flex:1;margin-bottom:0;">
                <button class="btn-small" id="wsConnectBtn" style="flex:0 0 80px;">Connect</button>
              </div>
              <div id="wsStatus" style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">Disconnected</div>
              <div id="wsLog" class="tool-output" style="max-height:200px;overflow:auto;font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;word-break:break-word;margin-bottom:4px;"></div>
              <div class="tool-row" style="gap:4px;">
                <textarea id="wsMessage" class="tool-textarea" placeholder="Message to send..." style="flex:1;min-height:32px;margin-bottom:0;"></textarea>
                <button class="btn-small" id="wsSendBtn" style="flex:0 0 60px;align-self:flex-end;">Send</button>
              </div>
              <button class="btn-small btn-danger" id="wsClearBtn" style="width:100%;margin-top:4px;">Clear Log</button>
            </div>
            <div class="tool-group">
              <label class="tool-label">Server-Sent Events (SSE)</label>
              <div class="tool-row" style="gap:4px;margin-bottom:4px;">
                <input type="text" id="sseUrl" class="tool-input" placeholder="https://api.example.com/events" style="flex:1;margin-bottom:0;">
                <button class="btn-small" id="sseConnectBtn" style="flex:0 0 80px;">Connect</button>
              </div>
              <div id="sseStatus" style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">Disconnected</div>
              <div id="sseLog" class="tool-output" style="max-height:200px;overflow:auto;font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;word-break:break-word;margin-bottom:4px;"></div>
              <button class="btn-small btn-danger" id="sseClearBtn" style="width:100%;">Clear Log</button>
            </div>
            <div class="tool-group">
              <label class="tool-label">UUID Generator</label>
              <div class="tool-row">
                <select id="uuidCount" class="tool-select" style="flex:1">
                  <option value="1" selected>1 UUID</option>
                  <option value="5">5 UUIDs</option>
                  <option value="10">10 UUIDs</option>
                </select>
                <button class="btn-small" id="uuidBtn" style="flex:1">Generate</button>
              </div>
              <div id="uuidOutput" class="tool-output"></div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Request Section -->
        <section class="request-section">
          <div class="url-bar">
            <select id="httpMethod" class="method-select">
              <option value="GET" selected>GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
              <option value="HEAD">HEAD</option>
              <option value="OPTIONS">OPTIONS</option>
            </select>
            <input type="text" id="requestUrl" class="url-input" placeholder="https://api.example.com/users" value="https://httpbin.org/get">
            <div class="timeout-wrap">
              <input type="number" id="timeoutInput" class="timeout-input" value="30" min="1" max="300" title="Timeout (seconds)">
              <span class="timeout-label">s</span>
            </div>
            <button class="btn-primary" id="sendBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              Send
            </button>
            <button class="btn-secondary" id="saveBtn">Save</button>
            <button class="btn-secondary" id="genCodeBtn" title="Generate code">&lt;/&gt;</button>
          </div>

          <div class="request-tabs">
            <button class="req-tab active" data-tab="params">Params</button>
            <button class="req-tab" data-tab="headers">Headers</button>
            <button class="req-tab" data-tab="body">Body</button>
            <button class="req-tab" data-tab="auth">Auth</button>
          </div>

          <div class="request-panel active" id="req-params">
            <div class="key-value-list" id="paramsList">
              <div class="kv-row">
                <input type="text" class="kv-key" placeholder="Key">
                <input type="text" class="kv-val" placeholder="Value">
                <button class="kv-del">×</button>
              </div>
            </div>
            <button class="btn-add-row" id="addParamBtn">+ Add parameter</button>
          </div>

          <div class="request-panel" id="req-headers">
            <div class="key-value-list" id="headersList">
              <div class="kv-row">
                <input type="text" class="kv-key" placeholder="Key" value="Content-Type">
                <input type="text" class="kv-val" placeholder="Value" value="application/json">
                <button class="kv-del">×</button>
              </div>
            </div>
            <button class="btn-add-row" id="addHeaderBtn">+ Add header</button>
          </div>

          <div class="request-panel" id="req-body">
            <div class="body-controls">
              <select id="bodyType">
                <option value="none">None</option>
                <option value="json" selected>JSON</option>
                <option value="graphql">GraphQL</option>
                <option value="form">Form Data</option>
                <option value="text">Plain Text</option>
                <option value="raw">Raw</option>
              </select>
              <button class="btn-small" id="formatJsonBtn">Format JSON</button>
            </div>
            <textarea id="bodyEditor" class="body-editor" placeholder='{"key": "value"}' spellcheck="false">{}</textarea>
            <div id="graphqlEditor" class="graphql-editor" style="display:none">
              <div class="graphql-query-section">
                <label class="graphql-label">Query</label>
                <textarea id="graphqlQuery" class="graphql-textarea" placeholder="query { ... }" spellcheck="false"></textarea>
              </div>
              <div class="graphql-variables-section">
                <label class="graphql-label">Variables (JSON)</label>
                <textarea id="graphqlVariables" class="graphql-textarea" placeholder='{"key": "value"}' spellcheck="false">{}</textarea>
              </div>
              <button class="btn-small" id="formatGraphqlBtn" style="margin-top:8px">Format GraphQL</button>
            </div>
          </div>

          <div class="request-panel" id="req-auth">
            <select id="authType" class="auth-select">
              <option value="none">No Auth</option>
              <option value="bearer">Bearer Token</option>
              <option value="basic">Basic Auth</option>
              <option value="apikey">API Key</option>
            </select>
            <div class="auth-fields" id="authFields"></div>
          </div>
        </section>

        <!-- Divider -->
        <div class="divider" id="divider"></div>

        <!-- Response Section -->
        <section class="response-section">
          <div class="response-header">
            <div class="response-meta">
              <span id="statusCode" class="status-code">—</span>
              <span id="statusText" class="status-text"></span>
              <span id="responseTime" class="response-time"></span>
              <span id="responseSize" class="response-size"></span>
            </div>
            <div class="response-tabs">
              <button class="res-tab active" data-tab="res-body">Body</button>
              <button class="res-tab" data-tab="res-headers">Headers</button>
              <button class="res-tab" data-tab="res-cookies">Cookies</button>
              <button class="res-tab" data-tab="res-tests">Tests</button>
            </div>
          </div>

          <div class="response-panel active" id="res-body">
            <div class="response-toolbar">
              <select id="resFormat">
                <option value="pretty">Pretty</option>
                <option value="raw">Raw</option>
                <option value="preview">Preview</option>
              </select>
              <button class="btn-small" id="copyResponseBtn">Copy</button>
              <button class="btn-small" id="copyCurlBtn" title="Copy as cURL">cURL</button>
              <button class="btn-small" id="downloadResponseBtn">Download</button>
              <button class="btn-small" id="exportHarBtn" title="Export as HAR">HAR</button>
              <div class="toolbar-spacer"></div>
              <input type="text" id="resSearch" class="search-input" placeholder="Search response...">
              <select id="searchOptions" class="search-options" style="padding:4px 8px;font-size:11px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-elevated);color:var(--text-primary);outline:none;">
                <option value="ci">Case Insensitive</option>
                <option value="cs">Case Sensitive</option>
                <option value="regex">Regex</option>
              </select>
            </div>
            <pre id="responseBody" class="response-body"><code class="language-json">// Send a request to see the response</code></pre>
          </div>

          <div class="response-panel" id="res-headers">
            <div class="headers-table" id="responseHeaders"></div>
          </div>

          <div class="response-panel" id="res-cookies">
            <div class="headers-table" id="responseCookies"></div>
          </div>

          <div class="response-panel" id="res-tests">
            <div class="response-toolbar">
              <button class="btn-small" id="addAssertionBtn">+ Add Assertion</button>
              <span id="testSummary" style="font-size:11px;color:var(--text-tertiary);margin-left:auto;"></span>
            </div>
            <div id="assertionsList" style="padding:12px;"></div>
            <div id="assertionResults" style="padding:12px;border-top:1px solid var(--border-subtle);"></div>
          </div>
        </section>
      </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Modal</h3>
          <button class="modal-close" id="modalClose">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>

  <script src="app.js"></script>
</body>
</html>
